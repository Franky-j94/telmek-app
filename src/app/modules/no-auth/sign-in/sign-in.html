<div class="vh-100 d-flex justify-content-center align-items-center bg-light">
    <div class="card shadow-lg" style="width: 400px;">
        <div class="card-body p-4">

            <div class="text-center mb-4">
                <h3 class="fw-bold">Iniciar Sesión</h3>
                <p class="text-muted">Sistema Administrativo</p>
            </div>

            <form [formGroup]="form" novalidate>

                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" class="form-control" formControlName="login">
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control" formControlName="password">
                </div>

                <div class="d-grid">
                    <button type="button" class="btn btn-primary" (click)="login()" [disabled]="form.invalid">
                        Entrar
                    </button>
                </div>

            </form>
            <div *ngIf="error" class="toast-container position-fixed top-0 end-0 p-3">
                <div class="toast-custom show">
                    <div class="toast-body">
                        {{ error }}
                    </div>
                </div>
            </div>


        </div>
    </div>
</div>
