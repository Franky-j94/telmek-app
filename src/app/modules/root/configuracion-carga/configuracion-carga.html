<div class="row">
    <div class="col-9">
        <h3 class="page-title">
            Configuración de Carga
        </h3>
    </div>
    <div class="col-3 d-flex justify-content-end">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item active"><a href="javascript:;">Configuración de Carga</a></li>
                <li class="breadcrumb-item " aria-current="page"></li>
            </ol>
        </nav>
    </div>
</div>

<div id="main-content" class="row">
    <div class="col-12 grid-margin stretch-card p-2">
        <div class="card">
            <div class="card-body">
                <div class="fa-pull-right">
                    <button type="button" id="btn-add" class="btn btn-outline-primary btn-fw"
                        (click)="throwAlert(content)">
                        <i class="fa fa-plus-circle"></i>
                        Agregar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="col-12 grid-margin stretch-card p-2">
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Proporción</th>
                                    <th>Diferencia</th>
                                    <th>Año</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                @for (item of rowsConfiguracionCarga; track item.id) {
                                <tr>
                                    <td>{{item.id}}</td>
                                    <td>{{item.proporcion}}</td>
                                    <td>{{item.diferencia}}</td>
                                    <td>{{item.anio}}</td>
                                    <td>
                                        <button type="button" class="btn btn-outline-primary btn-fw"
                                            (click)="edit(content, item)">
                                            <i class="fa fa-edit"></i>
                                        </button>&nbsp;
                                        <button type="button" class="btn btn-outline-danger btn-fw"
                                            (click)="onDestroy(item.id)">
                                            <i class="fa fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                                }
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<ng-template #content let-modal>
    <div class="modal-header">
        <h4 class="modal-title" id="modal-basic-title">{{confcarId ? 'Actualizar ' : 'Registrar '}}</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" (click)="closed()"></button>

    </div>
    <div class="modal-body">
        <form [formGroup]="this.resourceForm">
            <div class="form-group row p-2">
                <label class="col-md-5 col-form-label">Proporción</label>
                <div class="col-md-7">
                    <div class="input-group mb-4">
                        <input type="text" class="form-control" id="proporcion" placeholder=""
                            formControlName="proporcion" />
                    </div>
                </div>
            </div>
            <div class="form-group row p-2">
                <label class="col-md-5 col-form-label">Diferencia</label>
                <div class="col-md-7">
                    <div class="input-group mb-4">
                        <input type="text" class="form-control" placeholder="" formControlName="diferencia" />
                    </div>

                </div>
            </div>
            <div class="form-group row p-2">
                <label class="col-md-5 col-form-label">Año</label>
                <div class="col-md-7">
                    <div class="input-group mb-4">
                        <input type="text" class="form-control" placeholder="" formControlName="anio" />
                    </div>

                </div>
            </div>
            <div class="form-group row p-2">
                <label class="col-md-5 col-form-label">Estatus</label>
                <div class="col-md-7">
                    <div class="input-group mb-4">
                        <mat-checkbox formControlName="estatus"></mat-checkbox>
                    </div>

                </div>
            </div>
        </form>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-outline-danger" (click)="this.closed()">Cancelar</button>
        <button type="button" class="btn btn-outline-primary" (click)="this.register()">Guardar</button>
    </div>
</ng-template>
